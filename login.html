<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — RCO IT Help Site</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="login-page">

  <div class="login-container">

    <div class="login-logo-wrap">
      <img src="logo.png" alt="Rowe Casa Organics" class="login-logo"/>
    </div>

    <h1 class="login-title">RCO IT Help Site</h1>
    <p class="login-subtitle">Sign in with your Rowe Casa Organics account to continue.</p>

    <div class="login-domain-note">
      Only <strong>@rowecasaorganics.com</strong> accounts are permitted.
    </div>

    <button id="googleSignInBtn" class="login-google-btn">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>

    <div id="loginLoading" class="login-loading">
      <div class="login-spinner"></div>
      Signing you in...
    </div>

    <div id="loginError" class="login-error"></div>

    <div class="login-footer">
      Secure authentication powered by Firebase
    </div>

  </div>

  <script type="module">
    import { initializeApp }                       from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
                                                   from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyDEn7ooJJ1zATM5oEnx3ByDiOFTFxr_JiA",
      authDomain:        "rco-metrics-d0f3b.firebaseapp.com",
      projectId:         "rco-metrics-d0f3b",
      storageBucket:     "rco-metrics-d0f3b.firebasestorage.app",
      messagingSenderId: "1021645263850",
      appId:             "1:1021645263850:web:dfd5c7cd0bd99762679893",
      measurementId:     "G-DR5MLDL5BG"
    };

    const ALLOWED_DOMAIN = '@rowecasaorganics.com';

    const app      = initializeApp(FIREBASE_CONFIG);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    const btn      = document.getElementById('googleSignInBtn');
    const errEl    = document.getElementById('loginError');
    const loadEl   = document.getElementById('loginLoading');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.classList.add('show');
      loadEl.classList.remove('show');
      btn.disabled = false;
    }

    // If already signed in with valid domain, go straight to portal
    onAuthStateChanged(auth, user => {
      if (user) {
        if (user.email.endsWith(ALLOWED_DOMAIN)) {
          window.location.replace('index.html');
        } else {
          signOut(auth);
          showError('Access denied. Only @rowecasaorganics.com accounts are permitted.');
        }
      }
    });

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      errEl.classList.remove('show');
      loadEl.classList.add('show');

      try {
        const result = await signInWithPopup(auth, provider);
        const email  = result.user.email;

        if (!email.endsWith(ALLOWED_DOMAIN)) {
          await signOut(auth);
          showError('Access denied. Only @rowecasaorganics.com accounts are permitted.');
          return;
        }
        // onAuthStateChanged will handle the redirect
      } catch (err) {
        showError('Sign in failed: ' + err.message);
      }
    });
  </script>

</body>
</html>
